name: 'dbt_monitorial_datagovernance_integration_tests'
version: '1.0.0'
config-version: 2

require-dbt-version: [">=1.9.0", "<3.0.0"]

profile: 'integration_tests'

macro-paths: ["macros"]
model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]

vars:
  data_governance_database: "{{ env_var('DBT_TEST_GOVERNANCE_DATABASE', 'MONITORIAL_DATA_GOVERNANCE') }}"
  tag_store: "{{ env_var('DBT_TEST_TAG_STORE', 'TAGS') }}"
  policy_store: "{{ env_var('DBT_TEST_POLICY_STORE', 'POLICIES') }}"

models:
  dbt_monitorial_datagovernance_integration_tests:
    +materialized: table
