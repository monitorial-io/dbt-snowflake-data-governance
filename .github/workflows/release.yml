name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches dbt_project.yml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(grep '^version:' dbt_project.yml | sed "s/version: *['\"]\\(.*\\)['\"].*/\\1/")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match dbt_project.yml version ($PROJECT_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          CHANGELOG=$(awk "/^## Version $VERSION/,/^## Version [0-9]/" CHANGELOG.md | head -n -1)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
