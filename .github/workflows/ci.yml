name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}/integration_tests

jobs:
  lint:
    name: Lint (dbt parse)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dbt-version: '1.9.0'
            schema-suffix: '1_9'
          - dbt-version: '1.10.0'
            schema-suffix: '1_10'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-snowflake
        run: pip install "dbt-snowflake~=${{ matrix.dbt-version }}"

      - name: Write private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8

      - name: Create dbt profiles.yml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          {
            echo "integration_tests:"
            echo "  target: ci"
            echo "  outputs:"
            echo "    ci:"
            echo "      type: snowflake"
            echo "      account: \"${SNOWFLAKE_ACCOUNT}\""
            echo "      user: \"${SNOWFLAKE_USER}\""
            echo "      authenticator: snowflake_jwt"
            echo "      private_key_path: /tmp/rsa_key.p8"
            if [ -n "$SNOWFLAKE_PRIVATE_KEY_PASSPHRASE" ]; then
              echo "      private_key_passphrase: \"${SNOWFLAKE_PRIVATE_KEY_PASSPHRASE}\""
            fi
            echo "      role: \"${SNOWFLAKE_ROLE}\""
            echo "      warehouse: \"${SNOWFLAKE_WAREHOUSE}\""
            echo "      database: \"${SNOWFLAKE_DATABASE}\""
            echo "      schema: DBT_GOVERNANCE_CI"
            echo "      threads: 4"
          } > integration_tests/profiles.yml

      - name: Install packages
        working-directory: integration_tests
        run: dbt deps

      - name: Parse project (validate Jinja compilation)
        working-directory: integration_tests
        run: dbt parse

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - dbt-version: '1.9.0'
            schema-suffix: '1_9'
          - dbt-version: '1.10.0'
            schema-suffix: '1_10'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-snowflake
        run: pip install "dbt-snowflake~=${{ matrix.dbt-version }}"

      - name: Write private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8

      - name: Create dbt profiles.yml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          {
            echo "integration_tests:"
            echo "  target: ci"
            echo "  outputs:"
            echo "    ci:"
            echo "      type: snowflake"
            echo "      account: \"${SNOWFLAKE_ACCOUNT}\""
            echo "      user: \"${SNOWFLAKE_USER}\""
            echo "      authenticator: snowflake_jwt"
            echo "      private_key_path: /tmp/rsa_key.p8"
            if [ -n "$SNOWFLAKE_PRIVATE_KEY_PASSPHRASE" ]; then
              echo "      private_key_passphrase: \"${SNOWFLAKE_PRIVATE_KEY_PASSPHRASE}\""
            fi
            echo "      role: \"${SNOWFLAKE_ROLE}\""
            echo "      warehouse: \"${SNOWFLAKE_WAREHOUSE}\""
            echo "      database: \"${SNOWFLAKE_DATABASE}\""
            echo "      schema: DBT_GOVERNANCE_CI_${{ matrix.schema-suffix }}"
            echo "      threads: 4"
          } > integration_tests/profiles.yml

      - name: Install packages
        working-directory: integration_tests
        run: dbt deps

      - name: Setup governance objects (tags, policies)
        working-directory: integration_tests
        run: dbt run-operation setup_governance_objects

      - name: Run dbt build (models + tests)
        working-directory: integration_tests
        run: dbt build

      - name: Cleanup test schema
        if: always()
        working-directory: integration_tests
        run: |
          dbt run-operation cleanup_schema --args '{schema_name: DBT_GOVERNANCE_CI_${{ matrix.schema-suffix }}}' || true
